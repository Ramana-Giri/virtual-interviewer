<!-- REPORT PAGE -->
<div id="report-page" class="page">
  <div class="top-nav">
    <div class="logo-mark" style="font-size:20px;">
      <div class="logo-dot"></div> PrepSpark
    </div>
    <button class="btn-nav" onclick="showPage('dashboard-page'); loadDashboard();">← Dashboard</button>
  </div>

  <div class="report-body">

    <div class="report-header">
      <div class="report-eyebrow">Practice Session Report</div>
      <h1 class="report-title" id="rpt-title">Loading…</h1>
      <div class="report-meta">
        <div class="meta-chip">
          <div class="chip-dot"></div>
          <span id="rpt-role">—</span>
        </div>
        <div class="meta-chip">
          <div class="chip-dot" style="background:var(--accent)"></div>
          <span id="rpt-date">—</span>
        </div>
        <div class="meta-chip">
          <div class="chip-dot" style="background:var(--warn)"></div>
          <span id="rpt-session">—</span>
        </div>
      </div>
    </div>

    <!-- Verdict -->
    <div class="report-section">
      <div class="section-label">Overall Assessment</div>
      <div id="verdict-banner" class="verdict-banner verdict-neutral">
        <div class="verdict-icon" id="verdict-icon">📋</div>
        <div>
          <div class="verdict-title" id="verdict-title">…</div>
          <div class="verdict-sub" id="verdict-sub"></div>
        </div>
      </div>
    </div>

    <!-- Question Scores -->
    <div class="report-section">
      <div class="section-label">Question Scores</div>
      <div class="score-grid" id="score-grid"></div>
    </div>

    <!-- Executive Summary -->
    <div class="report-section" id="exec-summary-section">
      <div class="section-label">Executive Summary</div>
      <div class="executive-summary-card" id="executive-summary-body"></div>
    </div>

    <!-- AI Insights -->
    <div class="report-section" id="insights-section">
      <div class="section-label">AI Insights</div>
      <div class="analysis-grid" id="analysis-grid"></div>
    </div>

    <!-- Q&A Transcript -->
    <div class="report-section">
      <div class="section-label">Interview Transcript &amp; Feedback</div>
      <div id="qa-history"></div>
    </div>

  </div>
</div>
